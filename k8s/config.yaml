apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  POSTGRES_DB: event_management
  POSTGRES_USER: postgres
  USER_SERVICE_URL: http://user-service.event-management.svc.cluster.local:3001
  EVENT_SERVICE_URL: http://event-service.event-management.svc.cluster.local:3002
  REGISTRATION_SERVICE_URL: http://registration-service.event-management.svc.cluster.local:3003
  NOTIFICATION_SERVICE_URL: http://notification-service.event-management.svc.cluster.local:3004
  RABBITMQ_URL: amqp://rabbitmq:5672
  VITE_API_BASE_URL: /api
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://postgres:postgres@database:5432/event_management
  INTERNAL_SERVICE_TOKEN: event-management-internal-secret
  INITIAL_ORGANIZER_EMAIL: beso.organizer@example.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "user-service"
        static_configs:
          - targets: ["user-service:3001"]

      - job_name: "event-service"
        static_configs:
          - targets: ["event-service:3002"]

      - job_name: "registration-service"
        static_configs:
          - targets: ["registration-service:3003"]

      - job_name: "notification-service"
        static_configs:
          - targets: ["notification-service:3004"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
data:
  loki.yml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            replacement: /var/log/pods/*$1/$2/*.log
            target_label: __path__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: database-init-sql
data:
  init.sql: |
    DROP TABLE IF EXISTS notifications;
    DROP TABLE IF EXISTS registrations;
    DROP TABLE IF EXISTS events;
    DROP TABLE IF EXISTS users;

    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      email VARCHAR(150) UNIQUE NOT NULL,
      password VARCHAR(255) NOT NULL,
      role VARCHAR(50) DEFAULT 'user',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS events (
      id SERIAL PRIMARY KEY,
      title VARCHAR(255) NOT NULL,
      description TEXT NOT NULL,
      event_date DATE NOT NULL,
      start_time VARCHAR(20) NOT NULL,
      end_time VARCHAR(20) NOT NULL,
      location VARCHAR(255) NOT NULL,
      capacity INTEGER NOT NULL CHECK (capacity > 0),
      booked_seats INTEGER DEFAULT 0,
      available_seats INTEGER NOT NULL,
      category VARCHAR(100) DEFAULT 'General',
      organizer_id INTEGER,
      status VARCHAR(20) DEFAULT 'upcoming',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS registrations (
      id SERIAL PRIMARY KEY,
      user_id INT NOT NULL,
      event_id INT NOT NULL,
      status VARCHAR(50) DEFAULT 'confirmed',
      payment_status VARCHAR(50),
      payment_method VARCHAR(50),
      transaction_id VARCHAR(100),
      amount NUMERIC(10, 2),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      UNIQUE(user_id, event_id)
    );

    CREATE TABLE notifications (
      id SERIAL PRIMARY KEY,
      user_id INT NOT NULL,
      event_id INT,
      type VARCHAR(50) NOT NULL,
      message TEXT NOT NULL,
      status VARCHAR(20) DEFAULT 'unread',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

