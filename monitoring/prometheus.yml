global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:3001"]

  - job_name: "event-service"
    static_configs:
      - targets: ["event-service:3002"]

  - job_name: "registration-service"
    static_configs:
      - targets: ["registration-service:3003"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:3004"]
