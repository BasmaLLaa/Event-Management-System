services:
  database:
    image: postgres:15
    container_name: database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=event_management
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_management"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - event-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/event_management
      - JWT_SECRET=event-management-dev-secret
    depends_on:
      database:
        condition: service_healthy
    networks:
      - event-network

  event-service:
    build: ./event-service
    container_name: event-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/event_management
    depends_on:
      database:
        condition: service_healthy
    networks:
      - event-network

  registration-service:
    build: ./registration-service
    container_name: registration-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/event_management
      - USER_SERVICE_URL=http://user-service:3001
      - EVENT_SERVICE_URL=http://event-service:3002
    depends_on:
      database:
        condition: service_healthy
      user-service:
        condition: service_started
      event-service:
        condition: service_started
    networks:
      - event-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/event_management
    depends_on:
      database:
        condition: service_healthy
    networks:
      - event-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - VITE_API_BASE_URL=/api
      - USER_SERVICE_URL=http://user-service:3001
      - EVENT_SERVICE_URL=http://event-service:3002
      - REGISTRATION_SERVICE_URL=http://registration-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
    depends_on:
      - user-service
      - event-service
      - registration-service
      - notification-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - user-service
      - event-service
      - registration-service
      - notification-service
    networks:
      - event-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3005:3000"
    depends_on:
      - prometheus
    networks:
      - event-network

volumes:
  postgres-data:

networks:
  event-network:
    driver: bridge
